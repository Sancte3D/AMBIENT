name: firmware-c

# Validate the native RP2350 firmware on every push/PR that touches it:
#   1. host-tests  — compile + run the hardware-independent DSP/voice tests
#                     (pure C, no SDK). Fast, deterministic correctness signal.
#   2. firmware-build — full Pico SDK cross-build for the RP2350 (pico2),
#                     proving the codebase still links into a valid UF2.

on:
  push:
    paths:
      - "field-ambience-current/firmware-c/**"
      - "field-ambience-current/firmware-c-next/**"
      - ".github/workflows/firmware-c.yml"
  pull_request:
    paths:
      - "field-ambience-current/firmware-c/**"
      - "field-ambience-current/firmware-c-next/**"
      - ".github/workflows/firmware-c.yml"

defaults:
  run:
    shell: bash

jobs:
  host-tests:
    name: host unit tests (dsp + voices)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run host tests
        working-directory: field-ambience-current/firmware-c/test
        run: ./run_tests.sh

  firmware-build:
    name: RP2350 build (pico2)
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-none-eabi cmake build-essential

      - name: Checkout Pico SDK 2.1.0
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: "2.1.0"
          path: pico-sdk
          submodules: false

      - name: Init TinyUSB submodule (needed for USB CDC stdio)
        working-directory: pico-sdk
        run: git submodule update --init --depth 1 lib/tinyusb

      - name: Build (pico2)
        working-directory: field-ambience-current/firmware-c
        run: |
          mkdir -p build && cd build
          cmake .. -DPICO_BOARD=pico2
          make -j"$(nproc)"

      - name: Report size + verify UF2 exists
        working-directory: field-ambience-current/firmware-c/build
        run: |
          arm-none-eabi-size field_ambience_native.elf
          test -f field_ambience_native.uf2
          ls -la field_ambience_native.uf2

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: field_ambience_native-pico2-uf2
          path: field-ambience-current/firmware-c/build/field_ambience_native.uf2
          if-no-files-found: error

  # --- firmware-c-next: the active development tree -----------------------
  # Two-stage validation: host unit tests (incl. Engine V2) + a Pico SDK
  # cross-build. Since the r18.27 HAL reorg the product MCU is STM32H743
  # (ADR-0002); the Pico build is bench-only and produces display_hw_test.uf2
  # — the breadboard bring-up for the 1.9" ST7789 panel
  # (tools/display_hw_test.c). Download it from the workflow artifacts, no
  # local toolchain needed. (The STM32 product build gets CI once the Step
  # 13.3 ARM-GCC toolchain file + linker + startup land.)

  host-tests-next:
    name: host unit tests (firmware-c-next)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run host tests
        working-directory: field-ambience-current/firmware-c-next/test
        run: ./run_tests.sh

  firmware-build-next:
    name: RP2350 build (pico2, firmware-c-next)
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-none-eabi cmake build-essential

      - name: Checkout Pico SDK 2.1.0
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: "2.1.0"
          path: pico-sdk
          submodules: false

      - name: Init TinyUSB submodule (needed for USB CDC stdio)
        working-directory: pico-sdk
        run: git submodule update --init --depth 1 lib/tinyusb

      - name: Build (pico2 bench tool — display_hw_test)
        working-directory: field-ambience-current/firmware-c-next
        # Since the r18.27 HAL reorg the Pico target is bench-only: the SDK
        # cross-build produces the display_hw_test bring-up tool, not a
        # product firmware (the product moved to STM32H743 — ADR-0002). The
        # -DPICO_BOARD flag auto-selects FAM_TARGET=pico in CMakeLists.txt.
        run: |
          mkdir -p build && cd build
          cmake .. -DPICO_BOARD=pico2
          make -j"$(nproc)"

      - name: Report size + verify UF2 exists
        working-directory: field-ambience-current/firmware-c-next/build
        run: |
          arm-none-eabi-size display_hw_test.elf
          test -f display_hw_test.uf2
          ls -la display_hw_test.uf2

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-c-next-pico2-uf2
          path: field-ambience-current/firmware-c-next/build/display_hw_test.uf2
          if-no-files-found: error

  # --- STM32H743 product target: real ARM cross-build gate ----------------
  # The product MCU is STM32H743 (ADR-0002). Since r18.86 the h743 target is a
  # real ARM-GCC/CubeH7 cross-build (not a host-gcc skeleton), so this job
  # installs the ARM toolchain and cross-compiles + links the flashable image.
  # Catches prototype/declaration/HAL regressions in src/hal_h743/** in CI.
  # (Fixed r19.14: the old job installed no ARM toolchain and assumed host gcc
  # — it had been failing at cmake-configure since the r18.86 HAL reorg.)
  h743-crossbuild-next:
    name: STM32H743 ARM cross-build (firmware-c-next)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-none-eabi cmake build-essential
      - name: Cross-build h743 (FAM_TARGET=h743)
        working-directory: field-ambience-current/firmware-c-next
        run: |
          mkdir -p build-h743 && cd build-h743
          # CMakeLists auto-selects cmake/arm-none-eabi-m7.cmake for h743.
          cmake .. -DFAM_TARGET=h743
          make -j"$(nproc)"
          test -f field_ambience_h743 && echo "h743 cross-build linked OK"
          arm-none-eabi-size field_ambience_h743
